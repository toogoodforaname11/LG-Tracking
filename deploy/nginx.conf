# BC Local Government Council Tracker — nginx server block
# Serves the static Next.js frontend and proxies /api/* to the FastAPI backend.
#
# Place this file at: /etc/nginx/sites-available/lg-tracking
# Then: ln -s /etc/nginx/sites-available/lg-tracking /etc/nginx/sites-enabled/lg-tracking
# Then: certbot --nginx -d lg-tracker.ca

server {
    listen 80;
    server_name lg-tracker.ca;
    # Certbot will add SSL config here

    root /var/www/lg-tracking/frontend/out;
    index index.html;

    # --- Frontend (static export) ---
    location / {
        try_files $uri $uri.html $uri/ /index.html;
    }

    # --- Backend API ---
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts — discovery/processing can be slow
        proxy_connect_timeout 60s;
        proxy_send_timeout    120s;
        proxy_read_timeout    120s;
    }

    # FastAPI docs (disable in production if desired)
    location /docs {
        proxy_pass http://127.0.0.1:8000/docs;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /openapi.json {
        proxy_pass http://127.0.0.1:8000/openapi.json;
        proxy_set_header Host $host;
    }

    # Health check (no auth required)
    location /health {
        proxy_pass http://127.0.0.1:8000/health;
        proxy_set_header Host $host;
    }

    # Cache static assets
    location /_next/static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
